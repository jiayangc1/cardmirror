<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prosemirror-debate (dev)</title>
    <link rel="stylesheet" href="/src/editor/style.css" />
  </head>
  <body>
    <header id="ribbon">
      <div class="ribbon-section ribbon-left">
        <div class="ribbon-button-stack">
          <button id="open-btn" type="button" title="Open .docx" aria-label="Open">📂</button>
          <button id="export-btn" type="button" disabled title="Export to .docx" aria-label="Export">💾</button>
        </div>
        <input type="file" id="dropzone" accept=".docx" hidden />
      </div>
      <div class="ribbon-section ribbon-center">
        <button id="read-mode-btn" type="button" title="Read mode" aria-label="Read mode">👁</button>
        <button id="word-count-btn" type="button" title="Word Count Selection" aria-label="Word count">Σ</button>
      </div>
      <div class="ribbon-section ribbon-right">
        <button id="settings-btn" type="button" title="Settings" aria-label="Settings">⚙</button>
      </div>
    </header>
    <div id="nav-panel"></div>
    <main id="app">
      <section id="editor"></section>
    </main>
    <div id="status-bar">
      <div id="word-count-display" class="status-segment" title="Read-aloud word count and read time">
        <span id="word-count-text">—</span>
      </div>
      <div class="status-spacer"></div>
      <div class="zoom-controls" title="Zoom">
        <button id="zoom-out-btn" type="button" aria-label="Zoom out">−</button>
        <span id="zoom-pct">100%</span>
        <button id="zoom-in-btn" type="button" aria-label="Zoom in">+</button>
        <button id="zoom-reset-btn" type="button" aria-label="Reset zoom to 100%" title="Reset to 100%">↺</button>
      </div>
    </div>
    <script type="module" src="/src/editor/index.ts"></script>
  </body>
</html>
